# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - cleanmediator-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: learndevops.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_BBDE8AAF74354E4CA6CDCFE59F7757B8 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_5428B7B0E6A24C3CBEF2B16CEBC2771D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: learndevops.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_BBDE8AAF74354E4CA6CDCFE59F7757B8 }}/appsvc/staticsite:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EA5C5641D2944C51BC67B7961A3CCADE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D52246065404268A25033838F7870DD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_452A82A03B03414A9EA766D870EE0E86 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'cleanmediator-app'
          slot-name: 'Production'
          images: 'learndevops.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_BBDE8AAF74354E4CA6CDCFE59F7757B8 }}/appsvc/staticsite:${{ github.sha }}'
          